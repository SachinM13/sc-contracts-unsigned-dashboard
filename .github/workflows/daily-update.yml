name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate dashboard
        env:
          SC_API_AUTH: ${{ secrets.SC_API_AUTH }}
        run: python generate.py

      - name: Commit and push if changed
        run: |
          git config user.name "SC Dashboard Bot"
          git config user.email "systems@student-cribs.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Dashboard update $(date +%Y-%m-%d)"
          git push
